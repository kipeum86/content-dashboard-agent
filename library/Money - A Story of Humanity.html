            position: absolute;
            top: 0;
            left: 0;
            right: 0;

        // Wait for the DOM to be fully loaded before running the script
        document.addEventListener('DOMContentLoaded', () => {

            // --- 1. DOM Element Selection ---
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const hamburgerBtn = document.getElementById('hamburger-btn');
            const chapterNav = document.getElementById('chapter-navigation');
            const mainTitle = document.getElementById('book-title-main');
            const mainMeta = document.getElementById('book-meta-main');
            const currentSectionTitle = document.getElementById('current-section-title');
            const contentDisplay = document.getElementById('content-display');

            // --- 2. Helper Functions for Rendering ---

            /**
             * Creates a standard content card.
             * @param {string} title - The title of the card.
             * @param {string} content - The HTML content for the card body.
             * @param {string} [gridSpan='md:col-span-1'] - Tailwind grid span class.
             */
            function createCard(title, content, gridSpan = 'md:col-span-1') {
                // Use col-span-full for full-width items, otherwise default
                const spanClass = gridSpan === 'full' ? 'md:col-span-2 xl:col-span-3' : gridSpan;
                
                // Sanitize content to replace newlines with paragraphs for readability
                const formattedContent = content.split('\n\n')
                                                .map(p => `<p class="text-slate-700 leading-relaxed">${p}</p>`)
                                                .join('<div class="h-4"></div>'); // Spacer between paragraphs

                return `
                    <div class="bg-white p-6 rounded-lg shadow-md ${spanClass}">
                        <h3 class="text-xl font-semibold text-slate-900 mb-3 border-b border-gray-700 pb-2">${title}</h3>
                        <div class="space-y-4">
                            ${formattedContent}
                        </div>
                    </div>
                `;
            }

            /**
             * Creates a card with a bulleted list.
             * @param {string} title - The title of the card.
             * @param {string[]} listItems - An array of strings for the list.
             */
            function createListCard(title, listItems) {
                const itemsHtml = listItems.map(item => `
                    <li class="flex items-start">
                        <svg class="w-5 h-5 mr-2 flex-shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="color: var(--color-accent-gold);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                        <span class="text-slate-700">${item}</span>
                    </li>
                `).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <h3 class="text-xl font-semibold text-slate-900 mb-3 border-b border-gray-700 pb-2">${title}</h3>
                        <ul class="space-y-3">
                            ${itemsHtml}
                        </ul>
                    </div>
                `;
            }

            /**
             * Creates a special card for quotes.
             * @param {string} quote - The quote text.
             */
            function createQuoteCard(quote) {
                return `
                    <div class="quote-card p-6 rounded-lg shadow-md md:col-span-1">
                        <h3 class="text-xl font-semibold text-gray-100 mb-3 border-b border-gray-700 pb-2">Notable Quote</h3>
                        <blockquote class="pl-4">
                            ${quote}
                        </blockquote>
                    </div>
                `;
            }

            /**
             * Creates a card for keywords.
             * @param {string[]} keywords - An array of keyword strings.
             */
            function createKeywordsCard(keywords) {
                const keywordsHtml = keywords.map(keyword => `
                    <span class="keyword-tag inline-block px-3 py-1 rounded-full text-sm font-medium">
                        ${keyword}
                    </span>
                `).join(' ');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <h3 class="text-xl font-semibold text-slate-900 mb-3 border-b border-gray-700 pb-2">Keywords</h3>
                        <div class="flex flex-wrap gap-2">
                            ${keywordsHtml}
                        </div>
                    </div>
                `;
            }

            /**
             * Creates the custom timeline visualization for the summary page.
             */
            function createTimelineVisual() {
                // ADDED: A map of historical eras for each chapter to make the timeline more informative.
                const eraMap = [
                    "Prehistory / Early Agriculture", // Ch 1
                    "Ancient Mesopotamia",           // Ch 2
                    "Iron Age (Lydia)",              // Ch 3
                    "Classical Greece",              // Ch 4
                    "Roman Empire",                  // Ch 5
                    "Early Middle Ages (c. 1000 CE)",// Ch 6
                    "Medieval (Arab Influence)",     // Ch 7
                    "The Renaissance",               // Ch 8
                    "Early Modern Period",           // Ch 9
                    "Dutch Golden Age (17th C)",     // Ch 10
                    "Early 18th Century",            // Ch 11
                    "French Revolution",             // Ch 12
                    "Early American Republic",       // Ch 13
                    "19th Century",                  // Ch 14
                    "High Imperialism",              // Ch 15
                    "Late 19th C (USA)",             // Ch 16
                    "Pre-WWI Modernism",             // Ch 17
                    "Interwar Period",               // Ch 18
                    "Post-War Fiat Era",             // Ch 19
                    "Post-2008 Era",                 // Ch 20
                    "Contemporary & Future"          // Ch 21
                ];

                // Generate a node for each chapter
                const timelineNodes = jsonData.chapters.map(chapter => {
                    // Get the corresponding era, fallback to chapter number if map is incomplete
                    const era = eraMap[chapter.chapter_number - 1] || `Chapter ${chapter.chapter_number}`;

                    return `
                    <div class="timeline-node relative flex-shrink-0 pb-4">
                        <div class="timeline-node-title">${era}</div>
                        <div class="timeline-node-subtitle">Ch. ${chapter.chapter_number}: ${chapter.chapter_title}</div>
                        <p class="text-xs text-slate-600 mt-1">${chapter.keywords.slice(0, 2).join(', ')}...</p>
                    </div>
                `;
                }).join('');

                return `
                    <div class="md:col-span-2 xl:col-span-3 bg-white p-6 rounded-lg shadow-md">
                        <h3 class="text-xl font-semibold text-slate-900 mb-4 border-b border-gray-700 pb-2">Book Progression: A Timeline of Money</h3>
                        <!-- Horizontal scrolling container --><div class="timeline-scroll overflow-x-auto whitespace-nowrap py-4">
                            <div class="flex space-x-8 px-2 timeline-container">
                                ${timelineNodes}
                            </div>
                        </div>
                    </div>
                `;
            }


            // --- 3. Core Logic ---

            /**
             * Displays the content for a given section ID.
             * @param {string} id - The ID of the section ('overall_summary' or a chapter number).
             */
            function displayContent(id) {
                // Clear the main content area
                contentDisplay.innerHTML = '';
                
                let data, title;

                // Find the data and title based on the ID
                if (id === 'overall_summary') {
                    data = jsonData.overall_summary;
                    title = "Overall Summary & Main Theme";
                } else if (id === 'context') {
                    data = jsonData.field_context;
                    title = "Field Context & Contribution";
                } else if (id === 'limitations') {
                    data = jsonData.limitations_and_future_directions;
                    title = "Limitations & Future Directions";
                } else {
                    data = jsonData.chapters.find(c => c.chapter_number == id);
                    if (data) {
                        title = `Chapter ${data.chapter_number}: ${data.chapter_title}`;
                    } else {
                        // Fallback if data not found
                        contentDisplay.innerHTML = createCard('Error', 'Content not found.', 'full');
                        return;
                    }
                }

                // Update the main content header title
                currentSectionTitle.textContent = title;

                // --- Render Cards Based on Available Data ---
                
                if (id === 'overall_summary') {
                    // Special layout for summary
                    contentDisplay.innerHTML += createCard('Book Theme', jsonData.book_meta.main_theme, 'full');
                    contentDisplay.innerHTML += createCard('Abstract', data.abstract, 'full');
                    contentDisplay.innerHTML += createTimelineVisual(); // Add the custom visual
                    contentDisplay.innerHTML += createKeywordsCard(data.keywords);
                } else if (id === 'context') {
                    contentDisplay.innerHTML += createCard('Field Context', data.statement, 'full');
                } else if (id === 'limitations') {
                    contentDisplay.innerHTML += createListCard('Acknowledged Constraints', data.acknowledged_constraints);
                    contentDisplay.innerHTML += createListCard('Future Research Directions', data.future_research);
                } else {
                    // Standard chapter layout
                    if (data.summary) {
                        contentDisplay.innerHTML += createCard('Chapter Summary', data.summary, 'full');
                    }
                    if (data.key_arguments) {
                        contentDisplay.innerHTML += createListCard('Key Arguments', data.key_arguments);
                    }
                    if (data.key_takeaways_or_insights) {
                        contentDisplay.innerHTML += createListCard('Key Takeaways', data.key_takeaways_or_insights);
                    }
                    if (data.notable_quote) {
                        contentDisplay.innerHTML += createQuoteCard(data.notable_quote);
                    }
                    if (data.keywords) {
                        contentDisplay.innerHTML += createKeywordsCard(data.keywords);
                    }
                }
            }
            
            /**
             * Toggles the mobile menu (sidebar and overlay).
             */
            function toggleMenu() {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }

            /**
             * Sets the active state for a navigation link.
             * @param {HTMLElement} linkElement - The <a> element to set as active.
             */
            function setActiveLink(linkElement) {
                // Remove 'active' from all links
                chapterNav.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                });
                // Add 'active' to the clicked link
                if(linkElement) {
                    linkElement.classList.add('active');
                }
            }


            // --- 4. Initialization ---

            function initialize() {
                // 1. Populate main header
                mainTitle.textContent = jsonData.book_meta.title;
                mainMeta.textContent = `${jsonData.book_meta.author} (${jsonData.book_meta.publication_year})`;

                // 2. Populate navigation
                let navHtml = '';
                
                // Add Overall Summary link
                navHtml += `
                    <li>
                        <a href="#" class="nav-link active block p-3 rounded-lg text-gray-200 hover:bg-slate-700 hover:text-white transition-colors" data-id="overall_summary">
                            Overall Summary
                        </a>
                    </li>
                `;
                
                // Add links for each chapter
                jsonData.chapters.forEach(chapter => {
                    navHtml += `
                        <li>
                            <a href="#" class="nav-link block p-3 rounded-lg text-gray-200 hover:bg-slate-700 hover:text-white transition-colors" data-id="${chapter.chapter_number}">
                                <span class="font-medium">Ch. ${chapter.chapter_number}:</span> ${chapter.chapter_title}
                            </a>
                        </li>
                    `;
                });

                // Add links for Context and Limitations
                navHtml += `
                    <li>
                        <a href="#" class="nav-link block p-3 rounded-lg text-gray-200 hover:bg-slate-700 hover:text-white transition-colors" data-id="context">
                            Field Context
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link block p-3 rounded-lg text-gray-200 hover:bg-slate-700 hover:text-white transition-colors" data-id="limitations">
                            Limitations & Future
                        </a>
                    </li>
                `;
                
                chapterNav.innerHTML = navHtml;

                // 3. Load default content
                displayContent('overall_summary');
            }


            // --- 5. Event Listeners ---
            
            // Mobile menu toggles
            hamburgerBtn.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);

            // Navigation click handling (using event delegation)
            chapterNav.addEventListener('click', (e) => {
                // Find the link that was clicked
                const link = e.target.closest('a.nav-link');
                
                if (link) {
                    e.preventDefault();
                    const id = link.dataset.id;
                    
                    // Load the content
                    displayContent(id);

                    // Update the active state
                    setActiveLink(link);
                    
                    // Close the menu if on mobile
                    if (window.innerWidth < 1024) {
                        toggleMenu();
                    }
                }
            });

            // --- Run Initialization ---
            initialize();

        });
    </script>
