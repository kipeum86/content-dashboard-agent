        /* CSS Custom Properties for Theming */
        :root {
            --bg-primary: #f8fafc; /* Light Gray */
            --bg-secondary: #ffffff; /* White */
            --bg-accent: #eef2ff; /* Indigo Light */
            --text-primary: #111827; /* Dark Gray */
            --text-secondary: #4b5563; /* Medium Gray */
            --accent-color: #4f46e5; /* Indigo */
            --border-color: #e5e7eb; /* Light Border Gray */
            --font-main: 'Noto Sans KR', 'Inter', sans-serif;
        }

        /* Basic Body Styling */
        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Dashboard Container Layout */
        #dashboard-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 400px; /* Increased width significantly for readability */
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease-in-out;
            z-index: 40;
            overflow-y: auto; /* Make the entire sidebar scrollable */
            flex-shrink: 0; /* Prevent sidebar from shrinking */
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .sidebar-header img {
            max-width: 150px;
            margin: 0 auto; /* Adjusted margin */
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        /* Chapter Navigation List */
        #chapter-navigation {
            padding: 1rem 0;
        }

        #chapter-navigation li a {
            display: block;
            padding: 0.75rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        #chapter-navigation li a:hover {
            background-color: var(--bg-accent);
            color: var(--accent-color);
        }
        
        #chapter-navigation li a.active {
            background-color: var(--bg-accent);
            color: var(--accent-color);
            border-left-color: var(--accent-color);
        }

        .sidebar-footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: #9ca3af; /* Gray-400 */
            border-top: 1px solid var(--border-color);
            margin-top: auto; /* Pushes footer to the bottom */

        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #content-header {
            padding: 1.5rem 2rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);

            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        #book-meta-main {
            color: var(--text-secondary);
            margin-top: 0.25rem;

        #current-section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1rem;
            color: var(--accent-color);

        #content-display {
            padding: 2rem;
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        /* Card Styling */
        .content-card {
            background-color: var(--bg-secondary);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);

        .card-title {

            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }
        
        .card-title svg {
            margin-right: 0.5rem;
            color: var(--accent-color);
        }

        .content-card p, .content-card ul {
            color: var(--text-secondary);
            line-height: 1.7; /* Adjusted for Korean font */
        }

        .content-card ul {
            list-style-position: inside;
            padding-left: 0.5rem;
        }

        .content-card ul li {
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
            position: relative;
        }

        .content-card ul li::before {
            content: '•';
            color: var(--accent-color);
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
            position: absolute;
            left: 0;
        }

            display: inline-block;
            background-color: var(--bg-accent);
            color: var(--accent-color);

            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            margin: 0.25rem;

            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
            margin: 1rem 0;
            font-style: italic;
            color: #374151; /* Gray-700 */

        .visualization-container {
            grid-column: 1 / -1; /* Span full width */
        }

        .chart {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 200px;
            padding: 1rem;
            border-top: 2px solid var(--border-color);
            margin-top: 1rem;

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .bar {
            width: 60px;
            background-color: var(--accent-color);
            transition: height 0.5s ease-out;
            border-radius: 0.25rem 0.25rem 0 0;
            position: relative;
        }
        
        .bar-label {
            margin-top: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: center;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            color: var(--text-primary);
        }

        #bar-massed { background-color: #a5b4fc; /* Indigo-300 */ }
        #bar-interleaved { background-color: var(--accent-color); }

        /* Mobile Header and Navigation */
        #mobile-header {
            display: none; /* Hidden on desktop */
            padding: 1rem;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        #hamburger-btn {
            background: none;
            border: none;
            cursor: pointer;
            z-index: 50;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 35;

            #dashboard-container {

                top: 0;
                left: 0;

            #sidebar.open {
                transform: translateX(0);
            }

            #main-content {
                margin-left: 0;
            }

            #mobile-header {
                display: flex;
                align-items: center;
            }
            
            #content-header {
                position: static;
            }
            
            #content-display {
                grid-template-columns: 1fr;
            }

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const chapterNav = document.getElementById('chapter-navigation');
        const mainContent = document.getElementById('main-content');
        const contentDisplay = document.getElementById('content-display');
        const bookTitleMain = document.getElementById('book-title-main');
        const bookMetaMain = document.getElementById('book-meta-main');
        const currentSectionTitle = document.getElementById('current-section-title');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const overlay = document.getElementById('overlay');

        /**
         * Creates an SVG icon.
         * @param {string} pathData - The 'd' attribute for the SVG path.
         * @returns {string} - The complete SVG element as a string.
         */
        function createIcon(pathData) {
            return `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${pathData}</svg>`;
        }

        // Icon paths for different card types
        const icons = {
            summary: createIcon('<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>'),
            arguments: createIcon('<path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path>'),
            takeaways: createIcon('<path d="M15.03 5.3a2.4 2.4 0 0 1 3.4 3.4l-7.6 7.6a2.4 2.4 0 0 1-3.4-3.4Z"></path><path d="M9.06 16.64 2.26 9.84a3 3 0 0 1 0-4.24l7.6-7.6a3 3 0 0 1 4.24 0l7.6 7.6a3 3 0 0 1 0 4.24l-7.6 7.6a3 3 0 0 1-4.24 0Z"></path><path d="m14 9-3 3"></path>'),

            visualization: createIcon('<path d="M4 20h16"></path><path d="M4 16h16"></path><path d="M4 12h16"></path><path d="M4 8h16"></path><path d="M4 4h16"></path>'),

        /**
         * Initializes the dashboard content and navigation.
         */
        function initialize() {
            // Populate main header and sidebar with book meta data
            const { title, author, publication_year } = jsonData.book_meta;
            bookTitleMain.textContent = title;
            bookMetaMain.textContent = `${author} • ${publication_year}`;

            // Create navigation links
            const navFragment = document.createDocumentFragment();
            
            let li = document.createElement('li');
            li.innerHTML = `<a href="#" data-id="overall_summary">책 전체 요약</a>`;
            navFragment.appendChild(li);

            jsonData.chapters.forEach(chapter => {
                li = document.createElement('li');
                li.innerHTML = `<a href="#" data-id="chapter_${chapter.chapter_number}">제 ${chapter.chapter_number}장: ${chapter.chapter_title}</a>`;
                navFragment.appendChild(li);
            });
            
            li = document.createElement('li');
            li.innerHTML = `<a href="#" data-id="limitations">한계 및 향후 연구 방향</a>`;
            navFragment.appendChild(li);

            li = document.createElement('li');
            li.innerHTML = `<a href="#" data-id="context">분야별 맥락</a>`;
            navFragment.appendChild(li);

            chapterNav.appendChild(navFragment);

            // Load the default view
            displayContent('overall_summary');
            updateActiveLink('overall_summary');
        }

        /**
         * Creates a content card with a title and content.
         * @param {string} title - The title of the card.
         * @param {string} contentHtml - The HTML content for the card body.
         * @param {string} icon - The SVG icon for the card title.
         * @param {string} [customClasses=''] - Optional additional classes for the card.
         * @returns {HTMLElement} - The created card element.
         */
        function createCard(title, contentHtml, icon, customClasses = '') {
            const card = document.createElement('div');
            card.className = `content-card ${customClasses}`;
            card.innerHTML = `
                <h3 class="card-title">${icon} ${title}</h3>
                <div>${contentHtml}</div>
            `;
            return card;
        }
        
        /**
         * Renders the content for a given section ID.
         * @param {string} id - The ID of the section to display (e.g., 'overall_summary', 'chapter_1').
         */
        function displayContent(id) {
            contentDisplay.innerHTML = ''; // Clear previous content
            const contentFragment = document.createDocumentFragment();

            if (id === 'overall_summary') {
                const data = jsonData.overall_summary;
                currentSectionTitle.textContent = '책 전체 요약';
                
                contentFragment.appendChild(createCard('초록', `<p>${data.abstract.replace(/\n/g, '</p><p>')}</p>`, icons.summary, 'grid-column: 1 / -1;'));
                const keywordsHtml = data.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('');
                contentFragment.appendChild(createCard('핵심어', keywordsHtml, icons.keywords));

            } else if (id.startsWith('chapter_')) {
                const chapterNum = parseInt(id.split('_')[1]);
                const data = jsonData.chapters.find(c => c.chapter_number === chapterNum);
                if (!data) return;

                currentSectionTitle.textContent = `제 ${data.chapter_number}장: ${data.chapter_title}`;
                
                contentFragment.appendChild(createCard('요약', `<p>${data.summary}</p>`, icons.summary, 'grid-column: 1 / -1;'));
                
                const argumentsHtml = `<ul>${data.key_arguments.map(arg => `<li>${arg}</li>`).join('')}</ul>`;
                contentFragment.appendChild(createCard('핵심 주장', argumentsHtml, icons.arguments));
                
                const takeawaysHtml = `<ul>${data.key_takeaways_or_insights.map(t => `<li>${t}</li>`).join('')}</ul>`;
                contentFragment.appendChild(createCard('핵심 시사점', takeawaysHtml, icons.takeaways));
                
                contentFragment.appendChild(createCard('인용문', `<blockquote>${data.notable_quote}</blockquote>`, icons.quote));
                
                const keywordsHtml = data.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('');
                contentFragment.appendChild(createCard('핵심어', keywordsHtml, icons.keywords));

                // Conditional Visualization for Chapter 3
                if (chapterNum === 3) {
                    const vizCard = createCard(
                        '시각화: 집중 연습 vs. 교차 연습',
                        `
                        <p>이 장에서는 집중 연습(벼락치기)과 교차 연습을 대조합니다. 집중 연습이 처음에는 더 생산적으로 느껴지지만, 교차 연습이 장기적인 기억력과 지식 적용 능력 면에서 훨씬 뛰어난 결과를 가져옵니다.</p>
                        <div class="chart">
                            <div class="bar-group">
                                <div class="bar" id="bar-massed" style="height: 89%;"><span class="bar-value">89%</span></div>
                                <div class="bar-label">초기 연습<br/>(집중)</div>
                            </div>
                             <div class="bar-group">
                                <div class="bar" id="bar-interleaved-practice" style="height: 60%;"><span class="bar-value">60%</span></div>
                                <div class="bar-label">초기 연습<br/>(교차)</div>
                            </div>
                            <div class="bar-group">
                                <div class="bar" id="bar-massed" style="height: 20%;"><span class="bar-value">20%</span></div>
                                <div class="bar-label">최종 시험<br/>(집중)</div>
                            </div>
                            <div class="bar-group">
                                <div class="bar" id="bar-interleaved" style="height: 63%;"><span class="bar-value">63%</span></div>
                                <div class="bar-label">최종 시험<br/>(교차)</div>
                            </div>
                        </div>
                        `,
                        icons.visualization,
                        'visualization-container'
                    );
                    contentFragment.appendChild(vizCard);
                }

            } else if (id === 'limitations') {
                const data = jsonData.limitations_and_future_directions;
                currentSectionTitle.textContent = '한계 및 향후 연구 방향';

                const constraintsHtml = `<ul>${data.acknowledged_constraints.map(c => `<li>${c}</li>`).join('')}</ul>`;
                contentFragment.appendChild(createCard('인지된 한계점', constraintsHtml, icons.constraints));

                const researchHtml = `<ul>${data.future_research.map(r => `<li>${r}</li>`).join('')}</ul>`;
                contentFragment.appendChild(createCard('향후 연구 과제', researchHtml, icons.research));

            } else if (id === 'context') {
                const data = jsonData.field_context;
                currentSectionTitle.textContent = '분야별 맥락';
                contentFragment.appendChild(createCard('설명', `<p>${data.statement}</p>`, icons.context, 'grid-column: 1 / -1;'));
            }

            contentDisplay.appendChild(contentFragment);
        }

        /**
         * Updates the active state of navigation links.
         * @param {string} activeId - The ID of the currently active section.
         */
        function updateActiveLink(activeId) {
            document.querySelectorAll('#chapter-navigation a').forEach(link => {
                if (link.dataset.id === activeId) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
        
        // --- Event Listeners ---

        // Initialize the dashboard when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', initialize);

        // Event delegation for sidebar navigation
        chapterNav.addEventListener('click', (e) => {
            e.preventDefault();
            if (e.target.tagName === 'A') {
                const id = e.target.dataset.id;
                displayContent(id);
                updateActiveLink(id);
                // Close sidebar on mobile after selection
                if (window.innerWidth <= 992) {
                    sidebar.classList.remove('open');
                    overlay.style.display = 'none';
                }
            }
        });

        // Toggle mobile navigation
        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        });

    </script>
