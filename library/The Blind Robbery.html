        :root {
            --primary-bg: #1a1a1a;
            --secondary-bg: #2c2c2c;

            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;

            --shadow-color: rgba(0, 0, 0, 0.4);

            --font-secondary: 'Georgia', 'Times New Roman', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            font-family: var(--font-primary);
            background-color: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--secondary-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* --- MAIN DASHBOARD LAYOUT --- */
        #dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR NAVIGATION --- */
        #sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease-in-out;
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            z-index: 1000;
            overflow-y: auto; /* Allow the entire sidebar to scroll if content overflows */
        }
        
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar-header img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px var(--shadow-color);
            object-fit: cover;
        }

        .sidebar-header h3 {
            color: var(--text-secondary);
            font-family: var(--font-secondary);
            margin-top: 15px;
            font-size: 1rem;
            font-weight: normal;
        }

        #chapter-navigation {
            list-style-type: none;
            flex-grow: 1;
            /* overflow-y: auto; */ /* Removed to allow entire sidebar to scroll */
            padding: 10px 0;
        }

        #chapter-navigation li {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s ease-in-out;
            color: var(--text-secondary);
        }

        #chapter-navigation li:hover {
            background-color: var(--secondary-bg);
            color: var(--accent-hover);
            border-left-color: var(--accent-hover);
        }

        #chapter-navigation li.active {
            background-color: var(--secondary-bg);
            color: var(--accent-color);
            font-weight: bold;
            border-left-color: var(--accent-color);
        }
        
        .sidebar-footer {
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }

        #main-content {
            flex-grow: 1;
            padding: 20px;
            margin-left: 280px; /* Offset for sidebar */
        }
        
        #content-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        #book-title-main {
            font-family: var(--font-secondary);
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        #book-meta-main {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        #current-section-title {
            font-family: var(--font-secondary);
            font-size: 1.8rem;
            margin-top: 20px;
            color: var(--text-primary);
        }

        #content-display {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .content-card {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);

            font-family: var(--font-secondary);
            color: var(--accent-color);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        }

            margin-bottom: 8px;
        }

            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
        }
        .viz-box {
            background: var(--primary-bg);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            text-align: center;
            width: 80%;
            box-shadow: 0 1px 4px var(--shadow-color);
        }
        .viz-arrow {
            font-size: 2rem;
            color: var(--accent-color);
            line-height: 1;
        }
        .boom-bust-path {
            width: 100%;
            height: 100px;
            background:

            background-size: 50% 50%;
            position: relative;
        }
        .boom-bust-path::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            border-top: 1px dashed var(--text-secondary);
        }
        .boom-bust-text {
            position: absolute;
            font-size: 0.8rem;
            padding: 3px 6px;
            background: var(--primary-bg);
            border-radius: 4px;
        }
        #boom-text { top: 0; left: 25%; transform: translateX(-50%); }

        /* --- MOBILE & RESPONSIVE DESIGN --- */
        #mobile-header {
            display: none; /* Hidden on desktop */

            top: 0;
            left: 0;
            width: 100%;

            color: var(--accent-color);

            top: 0;
            left: 0;
            width: 100%;

            #book-title-main { font-size: 1.8rem; }

        }

                "Challenging the state's money monopoly is the most crucial battle for freedom and prosperity.",
                "You have a role to play by educating yourself and sharing what you've learned."
              ],
              "notable_quote": "Whether one likes it or not, it is a fact that the main issues of present-day politics are purely economic and cannot be understood without a grasp of economic theory.",
              "keywords": ["Austrian School of Economics", "propaganda", "state control", "mainstream economics", "war of ideas"]
            }
          ],
          "limitations_and_future_directions": {
            "acknowledged_constraints": [
              "Pervasive public ignorance regarding the complex and intentionally obscured monetary system.",
              "The deeply entrenched interests of politicians, central bankers, and mainstream economists who benefit from the current system.",
              "The state's monopoly is backed by coercive force and control over education and public discourse.",
              "'Collective corruption'—where much of the population supports state actions out of fear of immediate personal losses."
            ],
            "future_research": [
              "The primary direction is to enlighten a critical mass of people about the injustice of the current monetary system.",
              "Readers are called upon to actively spread the teachings of the Austrian School of Economics.",
              "The ultimate goal is to generate sufficient public pressure to remove the state's money monopoly.",
              "This process is framed as a 'war of ideas' where public opinion, informed by economic understanding, will be decisive."
            ]
          },
          "field_context": {
            "statement": "This book serves as a popular and accessible introduction to the monetary theory of the Austrian School of Economics, a heterodox school of thought that stands in stark opposition to mainstream Keynesian and Monetarist paradigms. It channels the foundational ideas of Ludwig von Mises's \"The Theory of Money and Credit\" and F.A. Hayek's Nobel Prize-winning work on business cycles into a modern polemic. The book's core argument—that central banking and fiat currency are the primary sources of economic instability and social injustice—is a hallmark of the Austrian tradition. It explicitly positions itself as an intellectual antidote to contemporary statist economic analyses, such as that of Thomas Piketty, by arguing that the observed rise in inequality is a feature of state intervention in money, not of free-market capitalism."
          }
        };

        // --- DOM ELEMENT REFERENCES ---
        const sidebar = document.getElementById('sidebar');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const overlay = document.getElementById('overlay');
        const chapterNav = document.getElementById('chapter-navigation');
        const mainContent = document.getElementById('main-content');
        const contentDisplay = document.getElementById('content-display');

        // --- CORE APPLICATION LOGIC ---
        document.addEventListener('DOMContentLoaded', initialize);

        /**
         * Initializes the dashboard on page load.
         * Populates header, generates navigation, and displays the initial summary.
         */
        function initialize() {
            // 1. Populate the main header with book metadata
            document.getElementById('book-title-main').textContent = jsonData.book_meta.title;
            document.getElementById('book-meta-main').textContent = `${jsonData.book_meta.author} (${jsonData.book_meta.publication_year})`;

            // 2. Generate navigation links dynamically
            generateNavigation();

            // 3. Display the overall summary by default
            displayContent('overall_summary');

            // 4. Set up all event listeners
            setupEventListeners();
        }

        /**
         * Creates and appends navigation links to the sidebar.
         */
        function generateNavigation() {
            chapterNav.innerHTML = ''; // Clear existing nav
            const navFragment = document.createDocumentFragment();

            // Helper to create list items
            const createNavItem = (id, text, title = '') => {
                const li = document.createElement('li');
                li.dataset.id = id;
                li.textContent = text;
                if (title) li.title = title;
                return li;
            };
            
            // Add sections in the correct order
            navFragment.appendChild(createNavItem('overall_summary', 'Overall Summary'));
            
            jsonData.chapters.forEach(ch => {
                navFragment.appendChild(createNavItem(
                    ch.chapter_number, 
                    `Chapter ${ch.chapter_number}`,
                    `Chapter ${ch.chapter_number}: ${ch.chapter_title}`
                ));
            });
            
            navFragment.appendChild(createNavItem('limitations_and_future_directions', 'Limitations & Future Directions'));
            navFragment.appendChild(createNavItem('field_context', 'Field Context'));
            
            chapterNav.appendChild(navFragment);
        }

        /**
         * Sets up event listeners for navigation and mobile menu.
         */
        function setupEventListeners() {
            // Use event delegation for efficient navigation clicks
            chapterNav.addEventListener('click', (e) => {
                if (e.target && e.target.nodeName === 'LI') {
                    const sectionId = e.target.dataset.id;
                    displayContent(sectionId);
                    // Close sidebar on mobile after selection
                    if (window.innerWidth <= 992) {
                        toggleSidebar(false);
                    }
                }
            });

            // Mobile menu controls
            hamburgerBtn.addEventListener('click', () => toggleSidebar(true));
            overlay.addEventListener('click', () => toggleSidebar(false));
        }

        /**
         * Displays the content for a given section ID.
         * @param {string} id - The ID of the section to display (e.g., 'overall_summary', '1').
         */
        function displayContent(id) {
            contentDisplay.innerHTML = ''; // Clear previous content
            
            let data, title;
            const contentFragment = document.createDocumentFragment();

            if (id === 'overall_summary') {
                data = jsonData.overall_summary;
                title = 'Overall Summary';
                contentFragment.appendChild(createCard('Abstract', data.abstract, 'full-width'));
                contentFragment.appendChild(createCard('Keywords', data.keywords, 'full-width'));
            } else if (id === 'limitations_and_future_directions') {
                data = jsonData.limitations_and_future_directions;
                title = 'Limitations & Future Directions';
                contentFragment.appendChild(createCard('Acknowledged Constraints', data.acknowledged_constraints));
                contentFragment.appendChild(createCard('Future Research Directions', data.future_research));
            } else if (id === 'field_context') {
                data = jsonData.field_context;
                title = 'Field Context';
                contentFragment.appendChild(createCard('Position within the Field', data.statement, 'full-width'));
            } else { // It's a chapter
                const chapterId = parseInt(id, 10);
                data = jsonData.chapters.find(ch => ch.chapter_number === chapterId);
                if (data) {
                    title = `Chapter ${data.chapter_number}: ${data.chapter_title}`;
                    contentFragment.appendChild(createCard('Chapter Summary', data.summary, 'full-width'));
                    contentFragment.appendChild(createCard('Key Arguments', data.key_arguments));
                    contentFragment.appendChild(createCard('Key Takeaways / Insights', data.key_takeaways_or_insights));
                    contentFragment.appendChild(createCard('Notable Quote', data.notable_quote, 'full-width'));

                    // Add a custom visualization for specific chapters
                    if (chapterId === 3) {
                         contentFragment.appendChild(createCantillonViz());
                    }
                    if (chapterId === 4) {
                        contentFragment.appendChild(createBoomBustViz());
                    }
                }
            }

            // Update header title and apply content
            document.getElementById('current-section-title').textContent = title;
            contentDisplay.appendChild(contentFragment);

            // Update active state in navigation
            updateActiveNav(id);
        }

        /**
         * Helper function to create a content card element.
         * @param {string} title - The title of the card.
         * @param {string|string[]} content - The content (string or array of strings).
         * @param {string} [className=''] - Optional additional class for the card.
         * @returns {HTMLElement} The created card element.
         */
        function createCard(title, content, className = '') {
            const card = document.createElement('div');
            card.className = `content-card ${className}`.trim();

            const cardTitle = document.createElement('h4');
            cardTitle.textContent = title;
            card.appendChild(cardTitle);

            if (Array.isArray(content)) {
                // Special handling for keywords
                if (title.toLowerCase().includes('keywords')) {
                    const list = document.createElement('ul');
                    list.className = 'keyword-list';
                    content.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        list.appendChild(li);
                    });
                    card.appendChild(list);
                } else {
                    const list = document.createElement('ul');
                    content.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = item;
                        list.appendChild(li);
                    });
                    card.appendChild(list);
                }
            } else if (title.toLowerCase().includes('quote')) {
                 const blockquote = document.createElement('blockquote');
                 blockquote.textContent = content;
                 card.appendChild(blockquote);
            }
             else {
                content.split('\n\n').forEach(paragraph => {
                    if (paragraph) {
                        const p = document.createElement('p');
                        p.textContent = paragraph;
                        card.appendChild(p);
                    }
                });
            }
            return card;
        }

        /**
         * Creates a visualization for the Cantillon Effect (Chapter 3).
         * @returns {HTMLElement} The visualization card element.
         */
        function createCantillonViz() {
            const card = document.createElement('div');
            card.className = 'content-card full-width';
            card.innerHTML = `
                <h4>Visualization: The Cantillon Effect</h4>
                <div class="visualization-container">
                    <p class="viz-label">New money is created and enters the economy at specific points, benefiting first-recipients before prices adjust for everyone else.</p>
                    <div class="cantillon-effect-viz">
                        <div class="viz-box"><strong>Source: Central Bank / Government</strong><br><small>(New Money Creation)</small></div>
                        <div class="viz-arrow">&darr;</div>
                        <div class="viz-box"><strong>First Recipients: Banks, Large Corporations, Government Contractors</strong><br><small>(Benefit: Purchase assets/goods at old, lower prices)</small></div>
                        <div class="viz-arrow">&darr;</div>
                        <div class="viz-box"><strong>Later Recipients: General Public, Wage Earners, Retirees</strong><br><small>(Harm: Face new, higher prices before their income rises)</small></div>
                    </div>
                </div>
            `;
            return card;
        }

        /**
         * Creates a visualization for the Boom-Bust Cycle (Chapter 4).
         * @returns {HTMLElement} The visualization card element.
         */
        function createBoomBustViz() {
            const card = document.createElement('div');
            card.className = 'content-card full-width';
            card.innerHTML = `
                <h4>Visualization: Austrian Business Cycle Theory</h4>
                <div class="visualization-container">
                    <p class="viz-label">Artificially low interest rates from credit expansion lead to an unsustainable boom and an inevitable bust.</p>
                    <div class="boom-bust-viz">
                        <div class="boom-bust-path">
                           <span id="boom-text" class="boom-bust-text"><strong>Artificial Boom</strong><br>Malinvestments</span>
                           <span id="bust-text" class="boom-bust-text"><strong>Inevitable Bust</strong><br>Correction</span>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        /**
         * Toggles the sidebar visibility for mobile view.
         * @param {boolean} show - Whether to show or hide the sidebar.
         */
        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.add('visible');
                overlay.style.display = 'block';
            } else {
                sidebar.classList.remove('visible');
                overlay.style.display = 'none';
            }
        }
        
        /**
         * Updates the active link in the sidebar navigation.
         * @param {string} id - The ID of the currently active section.
         */
        function updateActiveNav(id) {
            const navLinks = chapterNav.querySelectorAll('li');
            navLinks.forEach(link => {
                if (link.dataset.id === id) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

    </script>
</body>
</html>
