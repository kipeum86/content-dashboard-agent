        // DOM elements
        const chapterNav = document.getElementById('chapter-navigation');
        const contentDisplay = document.getElementById('content-display');
        const bookTitleMain = document.getElementById('book-title-main');
        const bookMetaMain = document.getElementById('book-meta-main');
        const currentSectionTitle = document.getElementById('current-section-title');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const overlay = document.getElementById('overlay');
        const sidebar = document.getElementById('sidebar');

        /**
         * Initializes the dashboard on DOM content load.
         * Populates header, generates navigation, and displays the initial summary.
         */
        function initialize() {
            // Populate main header with book metadata
            bookTitleMain.textContent = jsonData.book_meta.title;
            bookMetaMain.textContent = `${jsonData.book_meta.author} (${jsonData.book_meta.publication_year})`;
            
            // Create navigation links
            createNavigation();

            // Display the overall summary by default
            displayContent('overall_summary');
            setActiveLink('overall_summary');
        }

        /**
         * Creates and appends navigation links to the sidebar.
         */
        function createNavigation() {
            // Add link for Overall Summary
            let summaryLink = `<li><a href="#" data-id="overall_summary">Overall Summary</a></li>`;
            
            // Add links for special sections
            let specialSections = `
                <li><a href="#" data-id="field_context">Field Context</a></li>
                <li><a href="#" data-id="limitations">Limitations & Future Directions</a></li>
            `;
            
            // Add links for each chapter
            const chapterLinks = jsonData.chapters.map(chapter => `
                <li><a href="#" data-id="${chapter.chapter_number}">Ch. ${chapter.chapter_number}: ${chapter.chapter_title}</a></li>
            `).join('');

            chapterNav.innerHTML = summaryLink + chapterLinks + specialSections;
        }

        /**
         * Displays the content for a given section ID.
         * @param {string} id - The ID of the section to display (e.g., 'overall_summary' or chapter number).
         */
        function displayContent(id) {
            contentDisplay.innerHTML = ''; // Clear previous content
            
            let data, title;

            if (id === 'overall_summary') {
                data = jsonData.overall_summary;
                title = "Overall Summary";
                currentSectionTitle.textContent = title;
                contentDisplay.appendChild(createCard('Abstract', data.abstract, 'full-width', 'book'));
                contentDisplay.appendChild(createCard('Keywords', createKeywords(data.keywords), 'full-width', 'tag'));
            } else if (id === 'limitations') {
                data = jsonData.limitations_and_future_directions;
                title = "Limitations & Future Directions";
                currentSectionTitle.textContent = title;
                contentDisplay.appendChild(createCard('Acknowledged Constraints', createList(data.acknowledged_constraints), 'full-width', 'alert-triangle'));
                contentDisplay.appendChild(createCard('Future Research', createList(data.future_research), 'full-width', 'search'));
            } else if (id === 'field_context') {
                data = jsonData.field_context;
                title = "Field Context";
                currentSectionTitle.textContent = title;
                contentDisplay.appendChild(createCard('Position Within the Field', data.statement, 'full-width', 'globe'));
            } else {
                const chapter = jsonData.chapters.find(c => c.chapter_number == id);
                if (chapter) {
                    title = `Chapter ${chapter.chapter_number}: ${chapter.chapter_title}`;
                    currentSectionTitle.textContent = title;

                    contentDisplay.appendChild(createCard('Chapter Summary', chapter.summary, 'full-width', 'align-left'));
                    contentDisplay.appendChild(createCard('Key Arguments', createList(chapter.key_arguments), '', 'bar-chart-2'));
                    contentDisplay.appendChild(createCard('Key Takeaways', createList(chapter.key_takeaways_or_insights), '', 'key'));
                    contentDisplay.appendChild(createCard('Notable Quote', `<blockquote>${chapter.notable_quote}</blockquote>`, '', 'message-square'));
                    contentDisplay.appendChild(createCard('Keywords', createKeywords(chapter.keywords), 'full-width', 'tag'));

                    // Conditional Visualization
                    if (chapter.chapter_number === 30) { // "The Apple Squeeze"
                        contentDisplay.appendChild(createProfitShareVisualization());
                    }
                }
            }
        }
        
        /**
         * Helper function to create a styled card element.
         * @param {string} title - The title of the card.
         * @param {string} content - The HTML content for the card.
         * @param {string} extraClass - Additional CSS classes for the card.
         * @param {string} iconName - Feather icon name.
         * @returns {HTMLElement} The created card element.
         */
        function createCard(title, content, extraClass = '', iconName = 'file-text') {
            const card = document.createElement('div');
            card.className = `card ${extraClass}`;
            
            // Icon colors based on title
            const iconBgColor = title.includes('Quote') || title.includes('Constraints') ? 'bg-red-500' : 'bg-blue-500';

            card.innerHTML = `
                <div class="card-header">
                     <div class="icon ${iconBgColor}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-${iconName}"><title>${title}</title><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                     </div>
                    <h4>${title}</h4>
                </div>
                <div class="card-content">${content}</div>
            `;
            // Simple dynamic icon replacement
            if (iconName !== 'file-text') {
                 card.querySelector('svg').outerHTML = getIconSVG(iconName, title);
            }
            return card;
        }

        /**
         * Creates a custom visualization for "The Apple Squeeze" chapter.
         * @returns {HTMLElement} The visualization card element.
         */
        function createProfitShareVisualization() {
            const vizCard = document.createElement('div');
            vizCard.className = 'card full-width';
            vizCard.innerHTML = `
                <div class="card-header">
                    <div class="icon bg-blue-500">${getIconSVG('pie-chart', 'Visualization')}</div>
                    <h4>Visualization: The Apple Squeeze</h4>
                </div>
                <div class="visualization-container">
                    <p class="text-sm text-gray-400 mb-4">Apple captures a disproportionate share of industry profits relative to its market share.</p>
                    <div class="profit-share-chart">
                        <div class="bar-container">
                            <div class="bar-value text-blue-400">&lt;20%</div>
                            <div class="bar market-share" style="height: 20%;" title="Market Share"></div>
                            <div class="bar-label">Market Share</div>
                        </div>
                        <div class="bar-container">
                            <div class="bar-value text-red-400">&gt;80%</div>
                            <div class="bar profit-share" style="height: 85%;" title="Profit Share"></div>
                            <div class="bar-label">Profit Share</div>
                        </div>
                    </div>
                </div>`;
            return vizCard;
        }

        // --- Helper functions for content generation ---
        function createList(items) {
            return `<ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
        }

        function createKeywords(keywords) {
            return `<div class="keyword-tags">${keywords.map(kw => `<span>${kw}</span>`).join('')}</div>`;
        }

        /**
         * Sets the 'active' class on the current navigation link.
         * @param {string} id - The ID of the active section.
         */
        function setActiveLink(id) {
            document.querySelectorAll('#chapter-navigation a').forEach(a => {
                a.classList.remove('active');
                if (a.dataset.id === id) {
                    a.classList.add('active');
                }
            });
        }
        
        /**
         * Handles click events on the navigation menu.
         * @param {Event} e - The click event.
         */
        function handleNavClick(e) {
            e.preventDefault();
            const link = e.target.closest('a');
            if (link && chapterNav.contains(link)) {
                const id = link.dataset.id;
                displayContent(id);
                setActiveLink(id);
                // Close sidebar on mobile after clicking a link
                if (window.innerWidth <= 992) {
                    document.body.classList.remove('sidebar-active');
                }
            }
        }
        
        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', initialize);
        chapterNav.addEventListener('click', handleNavClick);
        
        hamburgerBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-active');
        });

        overlay.addEventListener('click', () => {
            document.body.classList.remove('sidebar-active');
        });

        // --- Icon SVG Generator ---
        function getIconSVG(name, title) {
            const icons = {
                'book': `<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>`,
                'tag': `<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line>`,
                'align-left': `<line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line>`,
                'bar-chart-2': `<line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>`,
                'key': `<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>`,
                'message-square': `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>`,
                'alert-triangle': `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>`,
                'search': `<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>`,
                'globe': `<circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>`,
                'pie-chart': `<path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path>`
            };
            return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><title>${title}</title>${icons[name] || ''}</svg>`;
        }

    </script>
</body>
</html>
