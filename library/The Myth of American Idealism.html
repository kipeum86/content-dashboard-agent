            .card-full, .card-two-thirds, .card-half { grid-column: span 2; }
            /* Smaller cards can sit side-by-side */
            .card-third { grid-column: span 1; }

        }

            #content-display {

                padding: 4px 10px;

                font-size: 1.1rem;
                padding: 5px 10px;

        // --- DOM ELEMENTS ---
        const els = {
            nav: document.getElementById('chapter-navigation'),
            contentDisplay: document.getElementById('content-display'),
            title: document.getElementById('book-title-main'),
            meta: document.getElementById('book-meta-main'),
            sectionTitle: document.getElementById('current-section-title'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            hamburger: document.getElementById('hamburger-btn'),
            dashboardContainer: document.getElementById('dashboard-container')
        };

        // --- CORE FUNCTIONS ---

        function initialize() {
            // 1. Populate Header Meta
            els.title.innerText = jsonData.book_meta.title;
            els.meta.innerText = `By ${jsonData.book_meta.author} | ${jsonData.book_meta.publication_year}`;

            // 2. Build Navigation
            buildNavigation();

            // 3. Set Default View
            displayContent('overall_summary');
        }

        function buildNavigation() {
            // Add "Book Overview" link
            const overviewLi = document.createElement('li');
            overviewLi.innerText = "Book Overview";
            overviewLi.dataset.id = 'overall_summary';
            overviewLi.addEventListener('click', (e) => handleNavClick('overall_summary', e.target));
            els.nav.appendChild(overviewLi);

            // Add "Field Context" link
            const contextLi = document.createElement('li');
            contextLi.innerText = "Field Context";
            contextLi.dataset.id = 'field_context';
            contextLi.addEventListener('click', (e) => handleNavClick('field_context', e.target));
            els.nav.appendChild(contextLi);

            // Add Chapters
            jsonData.chapters.forEach((chapter, index) => {
                const li = document.createElement('li');
                // Format title nicely
                const shortTitle = chapter.chapter_title.length > 35 
                    ? chapter.chapter_title.substring(0, 32) + '...' 
                    : chapter.chapter_title;
                
                li.innerText = chapter.chapter_number === 0 
                    ? `Intro: ${shortTitle}` 
                    : `Ch ${chapter.chapter_number}: ${shortTitle}`;
                
                li.dataset.id = `chapter_${index}`; // store array index
                li.addEventListener('click', (e) => handleNavClick(`chapter_${index}`, e.target));
                els.nav.appendChild(li);
            });

            // Add "Limitations & Future" link
            const limitLi = document.createElement('li');
            limitLi.innerText = "Limits & Future Directions";
            limitLi.dataset.id = 'limitations';
            limitLi.addEventListener('click', (e) => handleNavClick('limitations', e.target));
            els.nav.appendChild(limitLi);
        }

        function handleNavClick(id, targetEl) {
            // Update UI active state
            document.querySelectorAll('#chapter-navigation li').forEach(li => li.classList.remove('active'));
            targetEl.classList.add('active');
            
            // Display Content
            displayContent(id);

            // Close Mobile Menu if open
            if(window.innerWidth <= 992) {
                toggleMobileMenu(false);
            }
        }

        function displayContent(id) {
            // Clear container
            els.contentDisplay.innerHTML = '';
            
            // Scroll to top of MAIN CONTAINER (since header scrolls with content now)
            els.dashboardContainer.scrollTop = 0;

            if (id === 'overall_summary') {
                renderOverallSummary();
            } else if (id === 'field_context') {
                renderFieldContext();
            } else if (id === 'limitations') {
                renderLimitations();
            } else if (id.startsWith('chapter_')) {
                const index = parseInt(id.split('_')[1]);
                renderChapter(jsonData.chapters[index]);
            }
        }

        // --- RENDER HELPERS ---

        function createCard(title, contentHTML, widthClass = 'card-full') {
            const card = document.createElement('div');
            card.className = `card ${widthClass}`;
            card.innerHTML = `
                <div class="card-header">${title}</div>
                <div class="card-text">${contentHTML}</div>
            `;
            return card;
        }

        function renderOverallSummary() {
            els.sectionTitle.innerText = "Book Overview";
            const data = jsonData.overall_summary;

            // 1. Abstract
            els.contentDisplay.appendChild(createCard("Abstract", data.abstract, "card-two-thirds"));

            // 2. Main Theme (From Book Meta)
            els.contentDisplay.appendChild(createCard("Central Theme", jsonData.book_meta.main_theme, "card-third"));
            
            // 3. Infographic (New addition)
            const infographicHTML = `<img src="https://imgur.com/B6TEFdb.jpg" alt="Book Summary Infographic" style="width: 100%; height: auto; display: block; border-radius: 4px;">`;
            els.contentDisplay.appendChild(createCard("Visual Summary", infographicHTML, "card-full"));

            // 4. Keywords
            const keywordsHTML = `<div class="tag-cloud">
                ${data.keywords.map(k => `<span class="tag">${k}</span>`).join('')}
            </div>`;
            els.contentDisplay.appendChild(createCard("Core Keywords", keywordsHTML, "card-full"));
        }

        function renderFieldContext() {
            els.sectionTitle.innerText = "Field Context";
            const data = jsonData.field_context;
            
            els.contentDisplay.appendChild(createCard("Academic Positioning", data.statement, "card-full"));
        }

        function renderChapter(chapter) {
            els.sectionTitle.innerText = chapter.chapter_number === 0 
                ? chapter.chapter_title 
                : `Chapter ${chapter.chapter_number}: ${chapter.chapter_title}`;

            // 1. Summary (Top Left, large)
            els.contentDisplay.appendChild(createCard("Chapter Summary", chapter.summary, "card-two-thirds"));

            // 2. Quote (Top Right, visual)
            const quoteHTML = `<div class="quote-block">${chapter.notable_quote}</div>`;
            els.contentDisplay.appendChild(createCard("Notable Quote", quoteHTML, "card-third"));

            // 3. Key Arguments (Visualized as list)
            // Split distinct points if possible, otherwise list them
            const argsHTML = `<div class="argument-list">
                ${chapter.key_arguments.map((arg, i) => {
                    // Try to split on colon for bolding header of argument
                    const parts = arg.split(':');
                    const title = parts.length > 1 ? parts[0] + ':' : '';
                    const body = parts.length > 1 ? parts.slice(1).join(':') : arg;
                    
                    return `<div class="argument-item">
                        ${title ? `<strong>${title}</strong>` : ''}
                        ${body}
                    </div>`;
                }).join('')}
            </div>`;
            els.contentDisplay.appendChild(createCard("Key Arguments", argsHTML, "card-half"));

            // 4. Key Takeaways (Visualized as chips)
            const takeawaysHTML = `<div class="insight-grid">
                ${chapter.key_takeaways_or_insights.map(t => `
                    <div class="insight-chip">
                        <span class="insight-icon">💡</span>
                        <span>${t}</span>
                    </div>
                `).join('')}
            </div>`;
            els.contentDisplay.appendChild(createCard("Key Takeaways & Insights", takeawaysHTML, "card-half"));

            // 5. Keywords
             const keywordsHTML = `<div class="tag-cloud">
                ${chapter.keywords.map(k => `<span class="tag">${k}</span>`).join('')}
            </div>`;
            els.contentDisplay.appendChild(createCard("Chapter Keywords", keywordsHTML, "card-full"));
        }

        function renderLimitations() {
            els.sectionTitle.innerText = "Limitations & Future Directions";
            const data = jsonData.limitations_and_future_directions;

            // 1. Constraints List
            const constraintsHTML = `<ul class="list-visual">
                ${data.acknowledged_constraints.map(c => `<li>${c}</li>`).join('')}
            </ul>`;
            els.contentDisplay.appendChild(createCard("Acknowledged Constraints", constraintsHTML, "card-half"));

            // 2. Future Research List
             const futureHTML = `<ul class="list-visual">
                ${data.future_research.map(r => `<li>${r}</li>`).join('')}
            </ul>`;
            els.contentDisplay.appendChild(createCard("Avenues for Future Research", futureHTML, "card-half"));
        }

        // --- EVENT LISTENERS ---

        els.hamburger.addEventListener('click', () => toggleMobileMenu(true));
        els.overlay.addEventListener('click', () => toggleMobileMenu(false));

        function toggleMobileMenu(show) {
            if (show) {
                els.sidebar.classList.add('open');
                els.overlay.classList.add('show');
            } else {
                els.sidebar.classList.remove('open');
                els.overlay.classList.remove('show');
            }
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', initialize);

    </script>
</body>
