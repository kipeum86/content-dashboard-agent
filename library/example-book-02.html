            border-radius: 6px;

            font-size: 0.9rem;
            line-height: 1.3;

            color: var(--accent-primary);

            left: 0;
            color: var(--accent-primary);

          ]
        },
        {

          "key_arguments": [

            "The \"consensus\" timeline from these experts predicts partial automation by 2026, dramatic inequality by 2035, and a technological singularity by 2074.",
            "Divergent beliefs often stem from different definitions of what counts as evidence, causing experts to dismiss opposing views as \"doomerism\" or \"hype\"."
          ],
          "key_takeaways_or_insights": [
            "When reading any prediction, ask who is saying it and why, looking specifically for their vested interests and the type of society they wish to build.",
            "Engage in social and democratic dialogue to ensure the future of work moves toward a desirable \"utopia\" rather than a point of no return."
          ],
          "notable_quote": "There are no objective facts about the future because it is not yet set in stone.",
          "keywords": [
            "Field frames",
            "Expert bias",
            "Future-of-work scenarios"
          ]
        }
      ],
      "limitations_and_future_directions": {
        "acknowledged_constraints": [
          "Incomplete Evidence: The study on the future of work notes that experts often rely on subjective discipline-specific rules rather than universal facts.",
          "Industry Silos: Current cyber risk management is hindered by a lack of end-to-end perspective, with assessments remaining fragmented and subjective.",
          "Implementation Gaps: Agentic AI and living intelligence are largely in pilot or experimental stages, with significant organizational and people problems yet to be solved.",
          "Data Reliability: AI-driven personalized healthcare remains limited by the inconsistency of historical data and the difficulty of maintaining complex pathways.",

        ],
        "future_research": [
          "Development of 'explainable cyber risk' models that map technical events to business outcomes.",

          "Research into energy-efficient algorithmic innovations to mitigate environmental impact."
        ]
      },
      "field_context": {

      }
    };

    /**
     * ------------------------------------------------------------------
     * CORE LOGIC
     * ------------------------------------------------------------------
     */
    
    // DOM Elements
    const navList = document.getElementById('chapter-navigation');
    const displayArea = document.getElementById('content-display');
    const headerTitle = document.getElementById('book-title-main');
    const headerMeta = document.getElementById('book-meta-main');
    const sectionTitle = document.getElementById('current-section-title');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const hamburger = document.getElementById('hamburger-btn');

    // Initialize Dashboard
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Set Header Info
        headerTitle.textContent = jsonData.book_meta.title;
        headerMeta.textContent = `${jsonData.book_meta.author} | ${jsonData.book_meta.publication_year}`;

        // 2. Build Navigation Links
        buildNavigation();

        // 3. Load Default Content (Overall Summary)
        displayContent('summary');

        // 4. Setup Mobile Handlers
        hamburger.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
    });

    function buildNavigation() {
        // Link: Overall Summary
        addNavLink('Executive Summary', 'summary');

        // Links: Chapters
        jsonData.chapters.forEach(chapter => {
            addNavLink(`${chapter.chapter_number}. ${chapter.chapter_title}`, `chapter-${chapter.chapter_number}`);
        });

        // Link: Limitations & Future
        addNavLink('Limitations & Future', 'future');
    }

    function addNavLink(text, id) {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.textContent = text;
        btn.setAttribute('data-target', id);
        
        btn.addEventListener('click', () => {
            // Remove active class from all
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            // Add active to clicked
            btn.classList.add('active');
            // Load Content
            displayContent(id);
            // Close sidebar if mobile
            if (window.innerWidth <= 992) toggleSidebar();
        });

        li.appendChild(btn);
        navList.appendChild(li);
    }

    function toggleSidebar() {
        const isOpen = sidebar.classList.contains('open');
        if (isOpen) {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
            overlay.style.opacity = '0';
        } else {
            sidebar.classList.add('open');
            overlay.style.display = 'block';
            setTimeout(() => overlay.style.opacity = '1', 10);
        }
    }

    /**
     * ------------------------------------------------------------------
     * RENDERING ENGINE
     * ------------------------------------------------------------------
     */
    function displayContent(id) {
        displayArea.innerHTML = ''; // Clear current content
        
        // ------------------ CASE 1: OVERALL SUMMARY ------------------
        if (id === 'summary') {
            sectionTitle.textContent = "Executive Summary";
            
            // Abstract Card
            const abstractCard = createCard('Abstract', jsonData.overall_summary.abstract);
            
            // Keywords
            const badges = document.createElement('div');
            badges.className = 'badge-container';
            jsonData.overall_summary.keywords.forEach(kw => {
                const b = document.createElement('span');
                b.className = 'badge';
                b.textContent = kw;
                badges.appendChild(b);
            });
            abstractCard.appendChild(badges);
            displayArea.appendChild(abstractCard);

            // Context Card
            const contextCard = createCard('Field Context', jsonData.field_context.statement);
            displayArea.appendChild(contextCard);
        }
        
        // ------------------ CASE 2: CHAPTERS ------------------
        else if (id.startsWith('chapter-')) {
            const chapNum = parseInt(id.split('-')[1]);
            const chapter = jsonData.chapters.find(c => c.chapter_number === chapNum);
            
            sectionTitle.textContent = chapter.chapter_title;

            // 1. Summary Card
            const sumCard = createCard('Summary', chapter.summary);
            
            // Quote logic inside summary
            const quoteDiv = document.createElement('div');
            quoteDiv.className = 'quote-box';
            quoteDiv.textContent = `"${chapter.notable_quote}"`;
            sumCard.appendChild(quoteDiv);
            
            displayArea.appendChild(sumCard);

            // 2. Arguments & Takeaways (Grid Layout)
            const gridDiv = document.createElement('div');
            gridDiv.className = 'grid-2-col';

            // Args Column
            const argsDiv = document.createElement('div');
            argsDiv.className = 'grid-item';
            argsDiv.innerHTML = `<h3 style="color:var(--accent-primary); margin-bottom:10px;">Key Arguments</h3>`;
            const argList = document.createElement('ul');
            argList.className = 'list-group';
            chapter.key_arguments.forEach(arg => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.textContent = arg;
                argList.appendChild(li);
            });
            argsDiv.appendChild(argList);

            // Takeaways Column
            const takeDiv = document.createElement('div');
            takeDiv.className = 'grid-item';
            takeDiv.innerHTML = `<h3 style="color:var(--accent-secondary); margin-bottom:10px;">Actionable Insights</h3>`;
            const takeList = document.createElement('ul');
            takeList.className = 'list-group';
            chapter.key_takeaways_or_insights.forEach(item => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.textContent = item;
                takeList.appendChild(li);
            });
            takeDiv.appendChild(takeList);

            gridDiv.appendChild(argsDiv);
            gridDiv.appendChild(takeDiv);
            displayArea.appendChild(gridDiv);

            // 3. Custom Visual: Timeline for Intro or Logic Process for Others
            if (chapNum === 0) {
                // Introduction gets a specific CSS timeline visual
                const timelineCard = createCard('Historical Patterns of Disruption', '');
                timelineCard.innerHTML += `
                    <div class="timeline-container">
                        <div class="timeline-item">
                            <div class="timeline-title">Collective Responsibility</div>
                            <div class="timeline-desc">No lone inventors; requires ecosystem.</div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-title">Predictably Unpredictable</div>
                            <div class="timeline-desc">Broad trends are set, specific paths surprise us.</div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-title">Patient Perseverance</div>
                            <div class="timeline-desc">"Overnight" success takes decades.</div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-title">Shadows of Innovation</div>
                            <div class="timeline-desc">Every tech casts a shadow (e.g., cyber risk).</div>
                        </div>
                    </div>
                `;
                displayArea.appendChild(timelineCard);
            }
        }
        
        // ------------------ CASE 3: FUTURE & LIMITATIONS ------------------
        else if (id === 'future') {
            sectionTitle.textContent = "Limitations & Future Directions";

            // Grid Layout
            const gridDiv = document.createElement('div');
            gridDiv.className = 'grid-2-col';

            // Constraints
            const consCard = document.createElement('div');
            consCard.className = 'content-card';
            consCard.innerHTML = `<div class="card-header">Acknowledged Constraints</div>`;
            const consList = document.createElement('ul');
            consList.className = 'list-group';
            jsonData.limitations_and_future_directions.acknowledged_constraints.forEach(c => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.textContent = c;
                consList.appendChild(li);
            });
            consCard.appendChild(consList);

            // Future Research
            const futCard = document.createElement('div');
            futCard.className = 'content-card';
            futCard.innerHTML = `<div class="card-header">Future Research Avenues</div>`;
            const futList = document.createElement('ul');
            futList.className = 'list-group';
            jsonData.limitations_and_future_directions.future_research.forEach(r => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.textContent = r;
                futList.appendChild(li);
            });
            futCard.appendChild(futList);

            gridDiv.appendChild(consCard);
            gridDiv.appendChild(futCard);
            displayArea.appendChild(gridDiv);
        }
    }

    function createCard(title, text) {
        const div = document.createElement('div');
        div.className = 'content-card';
        
        const h3 = document.createElement('div');
        h3.className = 'card-header';
        h3.textContent = title;
        
        const p = document.createElement('div');
        p.className = 'card-text';
        p.textContent = text;
        
        div.appendChild(h3);
        div.appendChild(p);
        return div;
    }

</script>
</body>
</html>
