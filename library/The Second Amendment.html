            --primary-color: #1a2c42; /* Deep Navy - Represents Law/Federal */
            --secondary-color: #8c2f2f; /* Muted Crimson - Represents Conflict/History */
            --accent-color: #d4af37; /* Gold - Classic book binding feel */
            --bg-color: #f9f7f2; /* Light Parchment */
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-light: #546e7a;

            --sidebar-width: 300px; 
            --transition-speed: 0.3s;
            --font-heading: 'Merriweather', serif;
            --font-body: 'Roboto', sans-serif;
        }

        * {

            margin: 0;
            padding: 0;
        }

        }

            box-shadow: 8px 0 25px rgba(0,0,0,0.2);

            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

            max-height: 100%;
            object-fit: contain; 
            opacity: 1; 
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        
        .book-cover-container:hover .book-cover-img {
            transform: scale(1.02); 
        }

        /* NAVIGATION */
        #chapter-navigation {
            list-style: none;
            padding: 10px 0;
        }

        #chapter-navigation li {
            padding: 0;
            margin: 0;
        }

        .nav-btn {
            display: block;
            width: 100%;
            /* Adjusted padding for narrower width */
            padding: 14px 25px; 
            text-align: left;
            background: none;
            border: none;
            color: #bdc3c7;
            cursor: pointer;
            font-family: var(--font-body);
            /* Slightly reduced font size to fit narrower width */
            font-size: 1rem; 
            transition: all 0.2s;
            border-left: 6px solid transparent; 
            line-height: 1.5;
        }

        .nav-btn:hover {
            background-color: rgba(255,255,255,0.08);
            color: #fff;
            padding-left: 30px; 
        }

            background-color: rgba(255,255,255,0.12);
            color: #fff;
            border-left-color: var(--accent-color);
            font-weight: 500;
        }

            padding: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #95a5a6;
            border-top: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(0,0,0,0.15);

            background-color: rgba(255,255,255,0.4);

            color: var(--primary-color);
            margin-bottom: 10px;
            line-height: 1.1;
        }

            font-size: 1.1rem;
            color: var(--secondary-color);
            font-style: italic;
            margin-bottom: 25px;
        }

            letter-spacing: 2px;
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-top: 15px;
            font-weight: 700;
        }

            scroll-behavior: smooth;
        }

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            opacity: 0;
            pointer-events: none;

        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 35px;
            margin-bottom: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.07);
            border-top: 6px solid var(--primary-color);
            animation: fadeIn 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            transition: transform 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-3px);

            margin-bottom: 15px;
            line-height: 1.7;
            font-size: 1.1rem;

            color: var(--secondary-color);
            font-weight: bold;
            font-size: 1.3em;
            position: absolute;
            left: 0;
            top: -3px;
        }

            border-left: 8px solid var(--accent-color);
            padding: 30px;
            font-family: var(--font-heading);
            font-style: italic;
            font-size: 1.35rem; 
            color: var(--primary-color);
            margin: 35px 0;
            border-radius: 0 10px 10px 0;
            line-height: 1.6;
        }

            gap: 12px;
            margin-top: 25px;

            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        
        .tag:hover {
            background-color: #dfe6e9;
            color: var(--primary-color);
        }

        /* 1. Timeline CSS (Horizontal) */
        .timeline-container {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 50px 0 30px 0;
            padding: 0 20px;
        }
        .timeline-line {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 4px;
            background: #dcdde1;
            z-index: 1;
        }
        .timeline-node {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20%;
        }
        .timeline-dot {
            width: 36px;
            height: 36px;
            background: var(--primary-color);
            border: 5px solid #fff;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .timeline-node:hover .timeline-dot {
            transform: scale(1.2);
            background: var(--secondary-color);
        }
        .timeline-date {
            margin-top: 15px;
            font-weight: 800;
            font-size: 1rem;
            color: var(--secondary-color);
        }
        .timeline-label {
            margin-top: 8px;
            font-size: 0.9rem;
            text-align: center;
            color: var(--text-light);
            line-height: 1.3;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1200px) {
            #content-header {
                padding: 40px;
            }
            #content-display {
                padding: 40px;
            }
        }

        @media (max-width: 992px) {
            #mobile-header {
                display: flex;
            }

                position: fixed;
                left: calc(-1 * var(--sidebar-width)); 
                height: 100%;
                top: 0; 
                width: var(--sidebar-width);
                max-width: 85vw;
                overflow-y: auto; 
            }

            #sidebar.active {
                transform: translateX(var(--sidebar-width)); 
            }
            
            @media (max-width: 450px) {
                 #sidebar.active {
                    transform: translateX(100%);
                 }
                 #sidebar {
                    width: 100%;
                    max-width: 100%;
                    left: -100%; /* Ensure full width sidebar is hidden */
                 }
            }

            #main-content {
                padding-top: 60px; /* Space for mobile header */
            }

            #content-header {
                padding: 30px 25px;
            }

            #content-display {
                padding: 25px;
            }

            #book-title-main {
                font-size: 2rem;
            }

                padding-left: 20px;
                margin-top: 30px;

                top: 0;

                width: 100%;
                margin-bottom: 30px;
                align-items: flex-start;
            }

                margin-top: 2px;
            }
            .timeline-date {
                margin-top: 6px;
                margin-left: 20px;
                width: 70px;
                font-size: 1rem;
            }
            .timeline-label {
                margin-top: 6px;
                margin-left: 10px;
                text-align: left;
                flex: 1;
            }
        }
    </style>

        // 2. DOM ELEMENTS
        const bookTitleMain = document.getElementById('book-title-main');
        const bookMetaMain = document.getElementById('book-meta-main');
        const currentSectionTitle = document.getElementById('current-section-title');
        const contentDisplay = document.getElementById('content-display');
        const navList = document.getElementById('chapter-navigation');
        const mainContent = document.getElementById('main-content');
        
        // Mobile UI Elements
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        // 3. CORE FUNCTIONS

        function initialize() {
            // Set Header Info
            bookTitleMain.textContent = jsonData.book_meta.title;
            bookMetaMain.textContent = `${jsonData.book_meta.author} (${jsonData.book_meta.publication_year})`;
            
            // Build Navigation
            // 1. Overall Summary
            addNavItem('Overview', 'overall_summary', true);
            
            // 2. Chapters
            jsonData.chapters.forEach(chapter => {
                addNavItem(`Ch ${chapter.chapter_number}: ${chapter.chapter_title}`, `chapter_${chapter.chapter_number}`);
            });

            // 3. Limitations & Context
            addNavItem('Limitations & Future', 'limitations');
            addNavItem('Field Context', 'context');

            // Load Default Content
            displayContent('overall_summary');
        }

        function addNavItem(text, id, isActive = false) {
            const li = document.createElement('li');
            const btn = document.createElement('button');
            btn.className = isActive ? 'nav-btn active' : 'nav-btn';
            btn.textContent = text;
            btn.dataset.target = id;
            
            btn.addEventListener('click', (e) => {
                // Remove active class from all
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                // Add to clicked
                e.target.classList.add('active');
                // Display content
                displayContent(id);
                // Close sidebar on mobile
                closeSidebar();
            });

            li.appendChild(btn);
            navList.appendChild(li);
        }

        function displayContent(id) {
            // Scroll to top of main content area
            mainContent.scrollTop = 0;
            contentDisplay.innerHTML = ''; // Clear current

            if (id === 'overall_summary') {
                currentSectionTitle.textContent = "Book Overview";
                renderOverallSummary();
            } else if (id.startsWith('chapter_')) {
                const chapterNum = parseInt(id.split('_')[1]);
                const chapter = jsonData.chapters.find(c => c.chapter_number === chapterNum);
                currentSectionTitle.textContent = `Chapter ${chapterNum}: ${chapter.chapter_title}`;
                renderChapter(chapter);
            } else if (id === 'limitations') {
                currentSectionTitle.textContent = "Limitations & Future Directions";
                renderLimitations();
            } else if (id === 'context') {
                currentSectionTitle.textContent = "Field Context";
                renderContext();
            }
        }

        // 4. RENDERING FUNCTIONS

        function renderOverallSummary() {
            const data = jsonData.overall_summary;
            
            // Abstract Card
            const abstractCard = createCard('Abstract', data.abstract);
            
            // Keywords
            const kwContainer = document.createElement('div');
            kwContainer.className = 'tag-container';
            data.keywords.forEach(kw => {
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.textContent = kw;
                kwContainer.appendChild(tag);
            });
            abstractCard.appendChild(kwContainer);
            contentDisplay.appendChild(abstractCard);

            // Custom Visualization: Timeline
            const timelineHTML = `
                <div class="card-title">Historical Evolution Timeline</div>
                <div class="timeline-container">
                    <div class="timeline-line"></div>
                    
                    <div class="timeline-node">
                        <div class="timeline-dot"></div>
                        <div class="timeline-date">1791</div>
                        <div class="timeline-label">2nd Amendment Ratified (Civic Duty)</div>
                    </div>
                    
                    <div class="timeline-node">
                        <div class="timeline-dot" style="background:var(--secondary-color)"></div>
                        <div class="timeline-date">1934</div>
                        <div class="timeline-label">National Firearms Act (NRA Support)</div>
                    </div>

                    <div class="timeline-node">
                        <div class="timeline-dot" style="background:var(--secondary-color)"></div>
                        <div class="timeline-date">1977</div>
                        <div class="timeline-label">NRA "Revolt at Cincinnati"</div>
                    </div>

                    <div class="timeline-node">
                        <div class="timeline-dot" style="background:var(--secondary-color)"></div>
                        <div class="timeline-date">2008</div>
                        <div class="timeline-label">Heller Decision (Individual Right)</div>
                    </div>

                     <div class="timeline-node">
                        <div class="timeline-dot"></div>
                        <div class="timeline-date">2012</div>
                        <div class="timeline-label">Sandy Hook</div>
                    </div>
                </div>
            `;
            const timelineCard = document.createElement('div');
            timelineCard.className = 'content-card';
            timelineCard.innerHTML = timelineHTML;
            contentDisplay.appendChild(timelineCard);
        }

        function renderChapter(chapter) {
            // Summary Card
            contentDisplay.appendChild(createCard('Summary', chapter.summary));

            // Quote Card
            if (chapter.notable_quote) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'quote-box';
                quoteDiv.textContent = `"${chapter.notable_quote}"`;
                contentDisplay.appendChild(quoteDiv);
            }

            // Arguments and Takeaways in a 2-column layout for larger screens?
            // Keeping it stacked for simplicity in this constrained view
            
            // Arguments
            const argsCard = document.createElement('div');
            argsCard.className = 'content-card';
            argsCard.innerHTML = `<div class="card-title">Key Arguments</div>`;
            const argsList = document.createElement('ul');
            argsList.className = 'styled-list';
            chapter.key_arguments.forEach(arg => {
                const li = document.createElement('li');
                li.textContent = arg;
                argsList.appendChild(li);
            });
            argsCard.appendChild(argsList);
            contentDisplay.appendChild(argsCard);

            // Takeaways (Visual difference)
            const takeCard = document.createElement('div');
            takeCard.className = 'content-card';
            takeCard.style.borderTopColor = 'var(--secondary-color)'; // Red top border
            takeCard.innerHTML = `<div class="card-title" style="color:var(--secondary-color)">Insights & Takeaways</div>`;
            const takeList = document.createElement('ul');
            takeList.className = 'styled-list';
            chapter.key_takeaways_or_insights.forEach(take => {
                const li = document.createElement('li');
                li.textContent = take;
                takeList.appendChild(li);
            });
            takeCard.appendChild(takeList);
            contentDisplay.appendChild(takeCard);
        }

        function renderLimitations() {
            const data = jsonData.limitations_and_future_directions;
            
            // Constraints
            const conCard = document.createElement('div');
            conCard.className = 'content-card';
            conCard.innerHTML = `<div class="card-title">Acknowledged Constraints</div>`;
            const conList = document.createElement('ul');
            conList.className = 'styled-list';
            data.acknowledged_constraints.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                conList.appendChild(li);
            });
            conCard.appendChild(conList);
            contentDisplay.appendChild(conCard);

            // Future Research
            const futCard = document.createElement('div');
            futCard.className = 'content-card';
            futCard.innerHTML = `<div class="card-title">Future Research Directions</div>`;
            const futList = document.createElement('ul');
            futList.className = 'styled-list';
            data.future_research.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                futList.appendChild(li);
            });
            futCard.appendChild(futList);
            contentDisplay.appendChild(futCard);
        }

        function renderContext() {
            contentDisplay.appendChild(createCard('Field Context', jsonData.field_context.statement));
        }

        // Helper to create basic text cards
        function createCard(title, text) {
            const card = document.createElement('div');
            card.className = 'content-card';
            card.innerHTML = `
                <div class="card-title">${title}</div>
                <div class="card-text">${text}</div>
            `;
            return card;
        }

        // 5. MOBILE INTERACTION
        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        hamburgerBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', closeSidebar);

        // INITIALIZE APP
        document.addEventListener('DOMContentLoaded', initialize);

    </script>
</body>
</html>
